service: trip-planner-ai

# Disable Serverless Dashboard (not needed for hackathon)
console: false

plugins:
  - serverless-dotenv-plugin
  - serverless-python-requirements

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    BEDROCK_MODEL_ID: anthropic.claude-sonnet-4-6
    DYNAMODB_TABLE_NAME: trip-planner-trips
    JWT_SECRET: fsu-hackathon-2024-secret-key
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource: '*'
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
          Resource: 
            - arn:aws:dynamodb:us-east-1:*:table/trip-planner-trips

functions:
  generateItinerary:
    handler: handlers/itinerary.generate
    timeout: 60
    events:
      - http:
          path: /ai/itinerary/generate
          method: post
          cors: true

custom:
  pythonRequirements:
    dockerizePip: false
    slim: true
